<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .title }}</title>
    <meta name="description" content="{{ .description }}">
    <meta name="author" content="{{ .info.AuthorName }}">
    <link rel="canonical" href="{{ .info.SiteURL }}">

    <!-- Open Graph -->
    <meta property="og:title" content="{{ .title }}">
    <meta property="og:description" content="{{ .description }}">
    <meta property="og:url" content="{{ .info.SiteURL }}">
    <meta property="og:site_name" content="{{ .info.SiteName }}">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="zh_CN">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ .title }}">
    <meta name="twitter:description" content="{{ .description }}">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/static/images/icon.svg">

    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#0f172a">
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            light: '#06b6d4',
                            DEFAULT: '#0891b2',
                            dark: '#164e63',
                        },
                        dark: {
                            bg: '#0f172a',
                            surface: '#1e293b',
                            border: '#334155',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #06b6d4; }
        .text-gradient {
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-image: linear-gradient(to right, #06b6d4, #3b82f6);
        }
        .glow-bg {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(6,182,212,0.15) 0%, rgba(15,23,42,0) 70%);
            border-radius: 50%; z-index: -1; top: -100px; left: -100px; pointer-events: none;
        }
    </style>

    <!-- Structured data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "{{ .info.AuthorName }}",
        "url": "{{ .info.SiteURL }}",
        "description": "{{ .info.AuthorDesc }}"
    }
    </script>
</head>
